# ══════════════════════════════════════════════════════════════
# Stator Detection — Docker Compose
# ══════════════════════════════════════════════════════════════
# Server: Flask+WebRTC with model weights baked in
# Client: Nginx serving static files + reverse proxy to server
# ══════════════════════════════════════════════════════════════

services:
  # ── Server (Flask + WebRTC + AI Models) ────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: chignon-server:latest
    container_name: chignon-server
    ports:
      - "5000:5000"
    environment:
      - MODEL_DIR=/app
      - PROJECT_ROOT=/app
      - CLIENT_DIR=/app/client
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5002
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./client:/app/client:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')" ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # ── MLflow Tracking Server ──────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: stator-mlflow
    ports:
      - "5002:5002"
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5002
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    volumes:
      - ./mlflow:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── Client (Nginx static file server) ──────────────────────
  client:
    image: nginx:alpine
    container_name: chignon-client
    ports:
      - "8080:80"
    volumes:
      - ./client:/usr/share/nginx/html:ro
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
